# Zeabur service definitions
services:
  # Backend service
  backend:
    build:
      # Use backend folder
      src: ./backend
      command: pip install -r requirements.txt
      output: .
    run:
      # Start command
      command: uvicorn main:app --host 0.0.0.0 --port 8000
      port: 8000

  # Frontend service
  frontend:
    build:
      src: ./frontend
      command: npm install && npm run build
      output: dist
    run:
      command: npm start
      port: 3000
